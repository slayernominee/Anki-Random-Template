<div class="flashcard" id="fade-top">{{FrontSide}}</div>

<div class="flashcard" id="fade-bottom">
    <hr id="answer--fade" />
    <div class="field field-back">
        <div class="inline-block" id="back-wrap">
            <div
                id="solution"
                style="
                    text-align: center;
                    font-size: calc(17px + var(--s));
                    line-height: 1.6;
                "
            ></div>
            <span class="note"></span>
        </div>
    </div>
</div>

<script type="text/plain" id="tpl-back">
    {{Back}}
</script>

<script>
    (function () {
        try {
            /* ============================================================
             * Equation Template — core library (inlined from core.js).
             * Keep this block identical to core.js; tests/sync.test.js
             * verifies they do not drift.
             *
             * WARNING: Anki does text-wide substitution of field
             * references, even inside JS comments and string literals.
             * Never write a double-open-brace field reference anywhere
             * in this script except the intentional reads in the main
             * section below, or Anki will splice field content into
             * the code and corrupt it.
             * ============================================================ */
            // @BEGIN CORE@
            const CONSTS = { pi: Math.PI, e: Math.E, tau: 2 * Math.PI };
            const FRAC_MAX_DEN = 1000;
            const DEFAULT_DEC = 3;

            // ---------- session key ----------
            function hashStr(s) {
                s = String(s);
                let h = 5381;
                for (let i = 0; i < s.length; i++)
                    h = ((h * 33) ^ s.charCodeAt(i)) >>> 0;
                return "eq_" + h.toString(36);
            }

            // ---------- vars field normalization ----------
            // Anki stores fields as HTML: newlines become <br>/<div> tags.
            // Normalize to plain text so line-based parsing works. Used ONLY
            // for the vars field (Front/Back templates are left untouched).
            function normalizeVarsText(html) {
                let s = String(html == null ? "" : html);
                s = s.replace(/<\s*br\s*\/?\s*>/gi, "\n");
                s = s.replace(/<\/?\s*(div|p|li|tr|h[1-6])\b[^>]*>/gi, "\n");
                s = s.replace(/<[^>]*>/g, "");
                s = s.replace(/&nbsp;|&#160;/gi, " ");
                s = s.replace(/&amp;/gi, "&");
                s = s.replace(/&lt;/gi, "<");
                s = s.replace(/&gt;/gi, ">");
                s = s.replace(/&quot;|&#34;/gi, '"');
                s = s.replace(/&apos;|&#39;/gi, "'");
                s = s.replace(/\u2212/g, "-"); // unicode minus -> hyphen
                s = s.replace(/[\u00a0\u200b]/g, " "); // nbsp / zero-width
                return s;
            }

            // ---------- number / range parsing ----------
            function parseNum(tok) {
                const n = parseFloat(String(tok).trim().replace(",", "."));
                return Number.isFinite(n) ? n : NaN;
            }

            // Count decimals as WRITTEN, so trailing zeros matter:
            // "1.000" -> 3, "0.1" -> 1, "-5" -> 0.
            function decimalsWritten(tok) {
                const s = String(tok).trim();
                const dot = s.indexOf(".");
                return dot === -1 ? 0 : s.length - dot - 1;
            }

            // Expand a value spec into a list of candidate values.
            //   "7"          -> [7]
            //   "1, 2, 3"    -> [1, 2, 3]               (explicit list)
            //   "[-10, 3]"   -> [-10, -9, ..., 3]       (integer step)
            //   "[0.1, 0.3]" -> [0.1, 0.2, 0.3]         (1 decimal -> step 0.1)
            //   "[0.001, 1]" -> [0.001, ..., 1]         (3 decimals -> step 0.001)
            function expandValue(rhs) {
                rhs = String(rhs).trim();
                const m = rhs.match(/^\[(.+)\]$/);
                if (m) {
                    const toks = m[1].split(",").map((t) => t.trim());
                    if (toks.length !== 2) return [NaN];
                    const lo = parseNum(toks[0]),
                        hi = parseNum(toks[1]);
                    if (!Number.isFinite(lo) || !Number.isFinite(hi))
                        return [NaN];

                    const dp = Math.max(
                        decimalsWritten(toks[0]),
                        decimalsWritten(toks[1]),
                    );
                    const step = Math.pow(10, -dp);
                    let count = Math.round((hi - lo) / step) + 1;
                    if (count < 1) count = 1;
                    if (count > 100000) count = 100000; // safety cap

                    const arr = [];
                    for (let i = 0; i < count; i++) {
                        const v = lo + i * step;
                        arr.push(
                            dp > 0 ? parseFloat(v.toFixed(dp)) : Math.round(v),
                        );
                    }
                    return arr;
                }
                if (rhs.includes(",")) return rhs.split(",").map(parseNum);
                return [parseNum(rhs)];
            }

            function pick(arr) {
                if (!arr || !arr.length) return NaN;
                return arr[Math.floor(Math.random() * arr.length)];
            }

            // ---------- vars field parsing ----------
            // Each non-empty, non-comment line:  name = value  |  name := expr
            function parseVars(text) {
                const defs = [];
                const lines = String(text || "").split(/\r?\n/);
                for (const raw of lines) {
                    const line = raw.trim();
                    if (!line || line[0] === "#" || line.slice(0, 2) === "//")
                        continue;
                    const m = line.match(/^([A-Za-z_]\w*)\s*(:=|=)\s*(.+)$/);
                    if (m)
                        defs.push({ name: m[1], op: m[2], rhs: m[3].trim() });
                }
                return defs;
            }

            // ---------- expression evaluation ----------
            // Compiled functions are cached by source text (fast reuse).
            // `with(Math)` exposes sqrt/sin/abs/... ; `with(scope)` exposes
            // the variables (and pi/e/tau) — scope shadows Math.
            const _fnCache = {};
            function evalExpr(expr, scope) {
                if (expr == null) return NaN;
                expr = String(expr).trim();
                if (!expr) return NaN;
                const body = expr.replace(/\^/g, "**");
                let fn = _fnCache[body];
                if (!fn) {
                    try {
                        fn = new Function(
                            "scope",
                            "with(Math){with(scope){return(" + body + ");}}",
                        );
                        _fnCache[body] = fn;
                    } catch (e) {
                        return NaN;
                    }
                }
                try {
                    return fn(scope);
                } catch (e) {
                    return NaN;
                }
            }

            // Resolve every definition to a concrete value. Constants and
            // ranges are picked immediately; equations are resolved over
            // repeated passes so they may reference each other in any order.
            function resolve(defs) {
                const scope = Object.assign({}, CONSTS);
                const eqns = [];
                for (const d of defs) {
                    if (d.op === ":=") eqns.push(d);
                    else scope[d.name] = pick(expandValue(d.rhs));
                }
                let progress = true,
                    passes = 0;
                while (eqns.length && progress && passes < defs.length + 2) {
                    progress = false;
                    passes++;
                    for (let i = eqns.length - 1; i >= 0; i--) {
                        const v = evalExpr(eqns[i].rhs, scope);
                        if (Number.isFinite(v) || typeof v === "boolean") {
                            scope[eqns[i].name] = v;
                            eqns.splice(i, 1);
                            progress = true;
                        }
                    }
                }
                for (const e of eqns) scope[e.name] = NaN; // cyclic / broken
                return scope;
            }

            // ---------- fraction reconstruction ----------
            // Best rational approximation within maxDen via Stern-Brocot.
            // Only accepted if it matches the float essentially exactly,
            // so irrationals (sqrt(2), pi, ...) fall through to decimals.
            function toFraction(x, maxDen) {
                if (!Number.isFinite(x)) return null;
                const neg = x < 0;
                const y = Math.abs(x);
                let loN = 0,
                    loD = 1,
                    hiN = 1,
                    hiD = 0;
                while (true) {
                    const mN = loN + hiN,
                        mD = loD + hiD;
                    if (mD > maxDen) break;
                    if (mN / mD <= y) {
                        loN = mN;
                        loD = mD;
                    } else {
                        hiN = mN;
                        hiD = mD;
                    }
                }
                const loErr = Math.abs(y - loN / loD);
                const hiErr = hiD === 0 ? Infinity : Math.abs(y - hiN / hiD);
                let n, d;
                if (loErr <= hiErr) {
                    n = loN;
                    d = loD;
                } else {
                    n = hiN;
                    d = hiD;
                }
                if (d === 0) return null;
                if (Math.abs(y - n / d) > 1e-9 * Math.max(1, y)) return null;
                return [neg ? -n : n, d];
            }

            // A reduced denominator's decimal terminates iff its only prime
            // factors are 2 and 5.
            function isTerminating(d) {
                if (d <= 1) return true;
                while (d % 2 === 0) d /= 2;
                while (d % 5 === 0) d /= 5;
                return d === 1;
            }

            function formatValue(x, dec) {
                // Booleans (from comparisons like a == 2) render as words.
                if (x === true) return "true";
                if (x === false) return "false";
                if (!Number.isFinite(x)) return "NaN";
                const r = Math.round(x);
                if (Math.abs(x - r) < 1e-9) return String(r); // integer
                const f = toFraction(x, FRAC_MAX_DEN);
                if (f && !isTerminating(f[1])) {
                    // non-terminating rational -> exact fraction
                    return (
                        (x < 0 ? "-" : "") +
                        "\\frac{" +
                        Math.abs(f[0]) +
                        "}{" +
                        f[1] +
                        "}"
                    );
                }
                const dd = dec != null && dec >= 0 ? dec : DEFAULT_DEC;
                const rounded = parseFloat(x.toFixed(dd));
                // If the chosen precision would distort the value (e.g. decimals=0
                // rounding -0.5 to -1), and we have an exact fraction, show the
                // fraction instead of a misleading decimal.
                if (f && Math.abs(rounded - x) > 1e-9) {
                    return (
                        (x < 0 ? "-" : "") +
                        "\\frac{" +
                        Math.abs(f[0]) +
                        "}{" +
                        f[1] +
                        "}"
                    );
                }
                return String(rounded);
            }

            function formatSigned(s) {
                if (s === "NaN" || s === "true" || s === "false") return s;
                return s[0] === "-" ? s : "+" + s;
            }

            // ---------- template rendering ----------
            function readParens(s, idx) {
                if (s[idx] !== "(") return [idx, ""];
                let depth = 0,
                    j = idx;
                while (j < s.length) {
                    const c = s[j];
                    if (c === "(") depth++;
                    else if (c === ")") {
                        depth--;
                        if (depth === 0) return [j + 1, s.slice(idx + 1, j)];
                    }
                    j++;
                }
                return [idx, ""]; // unbalanced
            }

            function renderTemplate(tpl, scope, dec) {
                if (!tpl) return "";
                const hasOwn = Object.prototype.hasOwnProperty;
                let out = "",
                    i = 0;
                const n = tpl.length;
                while (i < n) {
                    if (tpl[i] !== "@") {
                        out += tpl[i];
                        i++;
                        continue;
                    }
                    const next = tpl[i + 1];

                    // @+  -> force sign, then either (expr) or a bare name
                    if (next === "+") {
                        if (tpl[i + 2] === "(") {
                            const rp = readParens(tpl, i + 2);
                            if (rp[0] > i + 2) {
                                out += formatSigned(
                                    formatValue(evalExpr(rp[1], scope), dec),
                                );
                                i = rp[0];
                                continue;
                            }
                        }
                        const ms = tpl.slice(i + 2).match(/^[A-Za-z_]\w*/);
                        if (ms) {
                            const sname = ms[0];
                            if (hasOwn.call(scope, sname))
                                out += formatSigned(
                                    formatValue(scope[sname], dec),
                                );
                            else out += "@+" + sname;
                            i += 2 + sname.length;
                            continue;
                        }
                    }

                    // @(expr)
                    if (next === "(") {
                        const rp = readParens(tpl, i + 1);
                        if (rp[0] > i + 1) {
                            out += formatValue(evalExpr(rp[1], scope), dec);
                            i = rp[0];
                            continue;
                        }
                    }

                    // @name
                    const m = tpl.slice(i + 1).match(/^[A-Za-z_]\w*/);
                    if (m) {
                        const name = m[0];
                        if (hasOwn.call(scope, name))
                            out += formatValue(scope[name], dec);
                        else out += "@" + name; // unknown -> leave literal
                        i += 1 + name.length;
                        continue;
                    }

                    // lone "@"
                    out += "@";
                    i++;
                }
                return out;
            }

            // ---------- MathJax (runtime only; DOM/window dependent) ----------
            function typesetElement(root) {
                if (!root) return;
                const MJ = window.MathJax;
                if (MJ && typeof MJ.typesetPromise === "function") {
                    if (typeof MJ.typesetClear === "function") {
                        try {
                            MJ.typesetClear([root]);
                        } catch (e) {}
                    }
                    return MJ.typesetPromise([root]).catch(function () {});
                }
                if (MJ && typeof MJ.typeset === "function") {
                    try {
                        MJ.typeset([root]);
                    } catch (e) {}
                    return;
                }
                if (MJ && MJ.Hub && typeof MJ.Hub.Queue === "function") {
                    try {
                        MJ.Hub.Queue(["Typeset", MJ.Hub, root]);
                    } catch (e) {}
                }
            }
            function whenMathJax(cb, tries) {
                if (tries === undefined) tries = 120;
                const MJ = window.MathJax;
                if (MJ) {
                    if (
                        MJ.startup &&
                        MJ.startup.promise &&
                        typeof MJ.startup.promise.then === "function"
                    )
                        return MJ.startup.promise.then(cb, cb);
                    cb();
                    return;
                }
                if (tries <= 0) {
                    cb();
                    return;
                }
                setTimeout(function () {
                    whenMathJax(cb, tries - 1);
                }, 100);
            }
            // @END CORE@

            /* ============================================================
             * Back-side main
             * ============================================================ */
            const VARS_TEXT = normalizeVarsText("{{vars}}");
            const decRaw = "{{decimals}}".trim();
            const decNum = Number(decRaw);
            // Note: Number("") === 0 (finite!), so an empty/missing
            // decimals field must be treated as the default, not as 0.
            const DEC =
                decRaw !== "" && Number.isFinite(decNum) && decNum >= 0
                    ? Math.round(decNum)
                    : DEFAULT_DEC;
            const key = hashStr(
                VARS_TEXT + "\x01" + "{{Front}}" + "\x01" + "{{Back}}",
            );
            const defs = parseVars(VARS_TEXT);

            // Normally the front script (re-run on the back side too) has
            // already resolved and stored the values. Fall back to resolving
            // here for back-only previews.
            let scope, dec;
            try {
                const stored = JSON.parse(sessionStorage.getItem(key));
                if (stored && stored.scope) {
                    scope = Object.assign({}, CONSTS, stored.scope);
                    dec = Number.isFinite(stored.dec) ? stored.dec : DEC;
                }
            } catch (e) {}
            if (!scope) {
                scope = resolve(defs);
                dec = DEC;
            }

            // Done with storage for this card; let the next card draw fresh.
            try {
                sessionStorage.removeItem(key);
            } catch (e) {}

            const container = document.getElementById("solution");
            const tplEl = document.getElementById("tpl-back");
            const tpl = tplEl ? tplEl.textContent : "";
            container.innerHTML = renderTemplate(tpl, scope, dec);

            requestAnimationFrame(function () {
                whenMathJax(function () {
                    typesetElement(container);
                });
            });
        } catch (e) {
            try {
                console.error("[equation/back]", e);
            } catch (_) {}
        }
    })();
</script>
